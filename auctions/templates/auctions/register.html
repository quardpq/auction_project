{% extends 'auctions/base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-16">
    <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 p-10 md:p-14 fade-in">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tight">Регистрация</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-3">Доступ к электронным торгам</p>
        </div>

        {% if message %}
            <div class="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl text-xs font-bold border border-red-100 text-center">
                {{ message }}
            </div>
        {% endif %}

        <form action="{% url 'register' %}" method="post" class="space-y-5">
            {% csrf_token %}
            <div class="group">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Логин</label>
                <input class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-[#0056CF] outline-none font-semibold transition-all" 
                       type="text" name="username" placeholder="Придумайте логин" required>
            </div>
            
            <div class="group">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Email</label>
                <input class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-[#0056CF] outline-none font-semibold transition-all" 
                       type="email" name="email" placeholder="example@mail.ru" required>
            </div>

            <div class="group">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Пароль</label>
                <input class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-[#0056CF] outline-none font-semibold transition-all" 
                       type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="group">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Повторите пароль</label>
                <input class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-[#0056CF] outline-none font-semibold transition-all" 
                       type="password" name="confirmation" placeholder="••••••••" required>
            </div>

            <button class="w-full bg-[#0056CF] hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all uppercase text-xs tracking-[0.2em] mt-4 active:scale-95" type="submit">
                Создать аккаунт
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-50 text-center">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-tight">
                Уже зарегистрированы? 
                <a href="{% url 'login' %}" class="text-[#0056CF] ml-1 hover:underline">Войти в систему</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
