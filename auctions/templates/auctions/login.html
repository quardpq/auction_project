{% extends 'auctions/base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-16">
    <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 p-10 md:p-14 fade-in">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-900 uppercase tracking-tight">Вход в систему</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-3">Авторизация участника торгов</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl text-[10px] font-black border border-red-100 text-center uppercase tracking-wider">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form action="{% url 'login' %}" method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="group">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Логин</label>
                <input class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-[#0056CF] outline-none font-semibold transition-all text-slate-900" 
                       type="text" name="username" placeholder="Ваш логин" required>
            </div>

            <div class="group">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-4">Пароль</label>
                <input class="w-full px-6 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-[#0056CF] outline-none font-semibold transition-all text-slate-900" 
                       type="password" name="password" placeholder="••••••••" required>
            </div>

            <button class="w-full bg-[#0056CF] hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all uppercase text-xs tracking-[0.2em] mt-4 active:scale-95" 
                    type="submit">
                Авторизоваться
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-slate-50 text-center">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-tight">
                Еще нет аккаунта? 
                <a href="{% url 'register' %}" class="text-[#0056CF] ml-1 hover:underline">Регистрация</a>
            </p>
        </div>
    </div>
</div>

<style>
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}
